"$schema" = 'https://starship.rs/config-schema.json'

# Catppuccin powerline prompt. The active flavour is swapped between
# catppuccin_mocha / catppuccin_latte by sync-theme.sh on every light/dark
# toggle — starship re-reads this file each prompt, so open shells switch live.
palette = 'catppuccin_mocha'

add_newline = true

format = """
[](surface0)\
$os\
$username\
[](fg:surface0 bg:surface1)\
$directory\
[](fg:surface1 bg:surface2)\
$git_branch\
$git_status\
[](fg:surface2)\
$nodejs\
$rust\
$golang\
$python\
$lua\
$c\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Arch = "󰣇 "
Linux = " "
Macos = "󰀵 "
Windows = "󰍲 "
Ubuntu = " "
Debian = " "
Fedora = " "

[username]
show_always = true
style_user = "bg:surface0 fg:mauve"
style_root = "bg:surface0 fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:blue bg:surface1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "fg:red bg:surface1"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Developer" = "󰲋 "
"dotfiles" = " "
".config" = " "

[git_branch]
symbol = ""
style = "fg:peach bg:surface2"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:peach bg:surface2"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "$${count} "
modified = "!${count} "
staged = "+${count} "
deleted = "✘${count} "

[nodejs]
symbol = " "
style = "fg:green"
format = '[ $symbol($version) ]($style)'

[rust]
symbol = " "
style = "fg:peach"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = " "
style = "fg:sky"
format = '[ $symbol($version) ]($style)'

[python]
symbol = " "
style = "fg:yellow"
format = '[ $symbol($version)(\($virtualenv\)) ]($style)'

[lua]
symbol = " "
style = "fg:blue"
format = '[ $symbol($version) ]($style)'

[c]
symbol = " "
style = "fg:sapphire"
format = '[ $symbol($version) ]($style)'

[java]
symbol = " "
style = "fg:maroon"
format = '[ $symbol($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:sapphire"
format = '[ $symbol$context ]($style)'

[cmd_duration]
min_time = 1000
style = "fg:yellow"
format = '[  $duration ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:overlay1"
format = '[  $time ]($style)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'

