# kitty.conf — Catppuccin (Mocha/Latte via active-colors.conf)

# ── Font ───────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0
disable_ligatures never

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor_shape               block
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0

# Cursor trail — the cursor smoothly glides to its new position, leaving a
# brief fading trail (kitty >= 0.36). `cursor_trail` is the idle threshold in ms
# (skip the animation if the cursor was idle longer). `cursor_trail_decay` is the
# fast/slow fade times; lower start_threshold animates even short hops.
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 0

# ── Scrollback ─────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ──────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select  yes

# ── Window / transparency ──────────────────────────────────────────────────────
remember_window_size     yes
window_padding_width     12
# Frosted terminal, matched to the quickshell glass panels: a translucent background
# that Hyprland blurs (see the kitty window_rule in hypr/hyprland.lua, no_blur removed).
# NOTE: Hyprland can't blur on an HDR output, so on DP-1 in HDR mode this reads as a
# plain translucent background (no frost) — the same limitation the bar has. On SDR it
# frosts properly. dynamic_background_opacity lets you nudge this live; raise toward
# 0.8 if text over a busy wallpaper is hard to read, or to 1.0 for fully opaque.
background_opacity       0.6
dynamic_background_opacity yes
background_blur          0

# ── Tab bar ────────────────────────────────────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"
active_tab_font_style bold

# ── Colors ─────────────────────────────────────────────────────────────────────
# Active theme is written to active-colors.conf by sync-theme.sh.
# On first install, copy kitty/colors-mocha.conf to ~/.config/kitty/active-colors.conf
include active-colors.conf

# ── Clipboard ──────────────────────────────────────────────────────────────────
# Allow read/write to both clipboard and primary selection without prompting
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ── Keyboard shortcuts ─────────────────────────────────────────────────────────
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+s  paste_from_selection
map ctrl+shift+t  new_tab
map ctrl+shift+w  close_tab
map ctrl+shift+l  next_tab
map ctrl+shift+h  previous_tab
map ctrl+equal    increase_font_size
map ctrl+minus    decrease_font_size
map ctrl+shift+0  restore_font_size
