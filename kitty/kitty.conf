# kitty.conf — Catppuccin Mocha

# ── Font ───────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0
disable_ligatures never

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ─────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ──────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select  yes

# ── Window ─────────────────────────────────────────────────────────────────────
remember_window_size   yes
window_padding_width   12
background_opacity     0.92
dynamic_background_color yes

# ── Tab bar ────────────────────────────────────────────────────────────────────
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_title_template     "{index}: {title}"
active_tab_font_style  bold

# ── Colors — Catppuccin Mocha ──────────────────────────────────────────────────
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #cba6f7

# Cursor
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL
url_color               #89b4fa

# Window border
active_border_color     #cba6f7
inactive_border_color   #45475a
bell_border_color        #f9e2af

# Tab bar
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Black
color0   #45475a
color8   #585b70

# Red
color1   #f38ba8
color9   #f38ba8

# Green
color2   #a6e3a1
color10  #a6e3a1

# Yellow
color3   #f9e2af
color11  #f9e2af

# Blue
color4   #89b4fa
color12  #89b4fa

# Magenta/Mauve
color5   #cba6f7
color13  #cba6f7

# Cyan/Sky
color6   #89dceb
color14  #89dceb

# White
color7   #bac2de
color15  #a6adc8

# ── Keyboard shortcuts ─────────────────────────────────────────────────────────
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+t  new_tab
map ctrl+shift+w  close_tab
map ctrl+shift+l  next_tab
map ctrl+shift+h  previous_tab
map ctrl+equal    increase_font_size
map ctrl+minus    decrease_font_size
map ctrl+shift+0  restore_font_size
