# cava config for the Quickshell bar audio visualizer.
# Emits one newline-terminated frame of ';'-separated bar values (0-100) on stdout.

[general]
mode = normal
framerate = 60
bars = 26
autosens = 1

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
noise_reduction = 0.50
