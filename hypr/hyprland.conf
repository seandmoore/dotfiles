################
### MONITORS ###
################

monitor = ,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$launcher = qs ipc call launcher toggle


#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper
exec-once = hypridle
exec-once = quickshell


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Catppuccin Mocha — Mauve active, Surface1 inactive
    col.active_border   = rgba(cba6f7ff)
    col.inactive_border = rgba(45475aff)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16
    rounding_power = 2.0

    active_opacity   = 1.0
    inactive_opacity = 0.95

    drop_shadow = true
    shadow_range = 24
    shadow_render_power = 3
    col.shadow = rgba(11111bcc)

    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = true
        popups = true
    }
}

animations {
    enabled = true

    bezier = smoothOut,  0.36, 0,    0.66, -0.56
    bezier = smoothIn,   0.25, 1,    0.5,  1
    bezier = overshot,   0.05, 0.9,  0.1,  1.05
    bezier = linear,     0,    0,    1,    1

    animation = windows,     1, 4,  overshot,  slide
    animation = windowsOut,  1, 4,  smoothOut, slide
    animation = windowsMove, 1, 4,  smoothIn
    animation = border,      1, 5,  linear
    animation = borderangle, 1, 8,  linear,    loop
    animation = fade,        1, 4,  smoothIn
    animation = fadeOut,     1, 4,  smoothOut
    animation = workspaces,  1, 5,  overshot,  slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    animate_manual_resizes = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:escape

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}


####################
### KEYBINDINGS  ###
####################

$mod = SUPER

# Applications
bind = $mod, Return,     exec, $terminal
bind = $mod, SPACE,      exec, $launcher
bind = $mod, Q,          killactive
bind = $mod, M,          exit
bind = $mod, E,          exec, $terminal -e ranger
bind = $mod, B,          exec, firefox

# Window management
bind = $mod, F,          fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod, J,          togglesplit

# Focus movement — vim keys
bind = $mod, H,          movefocus, l
bind = $mod, L,          movefocus, r
bind = $mod, K,          movefocus, u
bind = $mod, J,          movefocus, d

# Move windows — vim keys
bind = $mod SHIFT, H,    movewindow, l
bind = $mod SHIFT, L,    movewindow, r
bind = $mod SHIFT, K,    movewindow, u
bind = $mod SHIFT, J,    movewindow, d

# Resize windows
binde = $mod ALT, H,     resizeactive, -40 0
binde = $mod ALT, L,     resizeactive, 40 0
binde = $mod ALT, K,     resizeactive, 0 -40
binde = $mod ALT, J,     resizeactive, 0 40

# Workspaces
bind = $mod, 1,          workspace, 1
bind = $mod, 2,          workspace, 2
bind = $mod, 3,          workspace, 3
bind = $mod, 4,          workspace, 4
bind = $mod, 5,          workspace, 5
bind = $mod, 6,          workspace, 6
bind = $mod, 7,          workspace, 7
bind = $mod, 8,          workspace, 8
bind = $mod, 9,          workspace, 9

bind = $mod SHIFT, 1,    movetoworkspace, 1
bind = $mod SHIFT, 2,    movetoworkspace, 2
bind = $mod SHIFT, 3,    movetoworkspace, 3
bind = $mod SHIFT, 4,    movetoworkspace, 4
bind = $mod SHIFT, 5,    movetoworkspace, 5
bind = $mod SHIFT, 6,    movetoworkspace, 6
bind = $mod SHIFT, 7,    movetoworkspace, 7
bind = $mod SHIFT, 8,    movetoworkspace, 8
bind = $mod SHIFT, 9,    movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot
bind = , Print,           exec, grimblast copy area
bind = SHIFT, Print,      exec, grimblast copy screen


####################
### WINDOW RULES ###
####################

windowrule = float, class:pavucontrol
windowrule = float, class:nm-connection-editor
windowrule = float, class:blueman-manager
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save As)(.*)$

windowrule = opacity 0.92 0.85, class:kitty

layerrule = blur, quickshell
layerrule = ignorezero, quickshell
