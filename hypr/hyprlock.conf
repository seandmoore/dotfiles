general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_size = 8
    blur_passes = 3
    noise = 0.0117
    contrast = 0.8917
    brightness = 0.8
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Clock — large, centered
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(cdd6f4ff)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

# Date — below clock
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(bac2deff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color  = rgba(cba6f7ff)
    inner_color  = rgba(313244ff)
    font_color   = rgba(cdd6f4ff)
    fade_on_empty = true
    fade_timeout = 1000

    placeholder_text = <span foreground="##a6adc8">  Password</span>
    hide_input = false
    rounding = 12

    check_color   = rgba(a6e3a1ff)
    fail_color    = rgba(f38ba8ff)
    fail_text     = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    position = 0, -180
    halign = center
    valign = center
}

# Greeting / username
label {
    monitor =
    text = Hi, <b>$USER</b>
    color = rgba(a6adc8ff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -130
    halign = center
    valign = center
}
