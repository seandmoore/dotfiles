# ROCm environment for the graphical session (read by uwsm/systemd environment.d).
# Makes ROCm available to GUI apps launched from Hyprland (e.g. LM Studio).
ROCM_PATH=/opt/rocm
HIP_PATH=/opt/rocm
PATH=/opt/rocm/bin:${PATH}

# Hide the unsupported Raphael iGPU (gfx1036, device 1) from ROCm compute so
# frameworks only see the RX 7800 XT (gfx1101, device 0). Does not affect display.
HIP_VISIBLE_DEVICES=0
